name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: LLM Provider
      placeholder: "e.g., openai, anthropic, ollama"
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g., 22.0.0"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g., macOS 15, Ubuntu 24.04"
